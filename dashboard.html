<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenewAI | Spatial Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --brand-primary: #0f172a;
            --brand-accent: #3b82f6;
            --brand-glow: rgba(59, 130, 246, 0.5);
            --surface: #ffffff;
            --background: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--background);
            color: var(--brand-primary);
            overflow-x: hidden;
            perspective: 1000px;
        }

        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(248, 250, 252, 1) 0%, rgba(241, 245, 249, 1) 100%);
        }

        .orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.4; animation: orbFloat 20s infinite alternate; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 50px) scale(1.2); } }

        .spatial-card {
            transition: transform 0.2s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-modal {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.25);
        }

        .ai-status-glow {
            box-shadow: 0 0 15px var(--brand-glow);
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .node-entry { animation: slideInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn-haptic:active { transform: scale(0.96); }
    </style>
</head>
<body class="antialiased">

    <div class="aurora-bg">
        <div class="orb w-96 h-96 bg-blue-400 -top-20 -left-20"></div>
        <div class="orb w-80 h-80 bg-purple-400 bottom-0 right-0" style="animation-delay: -5s"></div>
    </div>

    <!-- Protected Dashboard UI -->
    <div id="dashboard-view" class="hidden">
        <nav class="sticky top-0 z-50 px-6 py-4 bg-white/40 backdrop-blur-xl border-b border-white/40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4 group">
                    <div class="bg-slate-900 p-2.5 rounded-2xl text-white transform group-hover:rotate-[360deg] transition-transform duration-700">
                        <i class="fas fa-cubes text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-slate-900 tracking-tighter">Renew<span class="text-blue-600">AI</span></h1>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full ai-status-glow"></span>
                            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Neural Link Active</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="openModal()" class="btn-haptic px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl text-sm font-bold shadow-xl shadow-blue-200 transition-all flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> New Node
                    </button>
                    <button onclick="logout()" class="w-12 h-12 flex items-center justify-center rounded-2xl text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 md:p-10 relative">
            <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tighter mb-2">Command Center</h2>
                    <p class="text-slate-500 font-medium">Hello, <span id="user-display-name" class="text-slate-900 font-bold">Explorer</span>. Monitoring <span id="nodeCount" class="text-blue-600 font-extrabold">0</span> nodes.</p>
                </div>
                
                <div class="bg-white/60 border border-white p-2 rounded-2xl flex items-center gap-4 px-4 shadow-sm">
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase">Status</p>
                        <p class="text-xs font-bold text-emerald-600">Synced</p>
                    </div>
                    <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-blue-500">
                        <i class="fas fa-wifi"></i>
                    </div>
                </div>
            </header>

            <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Data injected here -->
            </div>
        </main>
    </div>

    <!-- Auth View (Shown if no token) -->
    <div id="auth-view" class="min-h-screen flex items-center justify-center p-6">
        <div class="spatial-card w-full max-w-md p-10 rounded-[3rem] text-center">
            <div class="bg-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-8">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tighter mb-2">Neural Access</h2>
            <p class="text-slate-500 text-sm mb-8">Please login to sync your spatial nodes.</p>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="login-email" required placeholder="Email Address" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold">
                <input type="password" id="login-pass" required placeholder="Access Key" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all">Connect Link</button>
            </form>
        </div>
    </div>

    <!-- Create Node Modal -->
    <div id="nodeModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md">
        <div class="glass-modal w-full max-w-lg rounded-[3rem] p-10 relative">
            <h3 class="text-2xl font-black text-slate-900 mb-6">Initialize Node</h3>
            <form id="nodeForm" onsubmit="createNode(event)" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Node Title</label>
                    <input type="text" id="node-title" required class="w-full p-4 rounded-2xl bg-white border border-slate-100 font-bold" placeholder="AWS Infrastructure">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Allocation (₹)</label>
                        <input type="number" id="node-amount" required class="w-full p-4 rounded-2xl bg-white border border-slate-100 font-bold" placeholder="5000">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Threshold Date</label>
                        <input type="date" id="node-expiry" required class="w-full p-4 rounded-2xl bg-white border border-slate-100 font-bold">
                    </div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">Deploy to Backend</button>
                <button type="button" onclick="closeModal()" class="w-full text-slate-400 font-bold text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3"></div>

    <script>
        const API_URL = "http://localhost:5000"; 
        let token = localStorage.getItem("token");

        // 1. ROUTE PROTECTION & REDIRECT
        function checkAuth() {
            if (!token) {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
            } else {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                loadDashboardData();
            }
        }

        // 2. LOGIN SYSTEM
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                localStorage.setItem("token", data.token);
                token = data.token;
                if(data.user) document.getElementById('user-display-name').innerText = data.user.name;
                
                showToast("Access Granted", "Neural link established.", "success");
                checkAuth();
            } catch (err) {
                showToast("Auth Failed", err.message, "error");
            }
        }

        // 3. CREATE ALERT -> BACKEND
        async function createNode(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById('node-title').value,
                amount: document.getElementById('node-amount').value,
                expiry: document.getElementById('node-expiry').value
            };

            try {
                const res = await fetch(`${API_URL}/api/alerts`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Failed to deploy node");
                
                showToast("Success", "Node deployed to spatial layer.", "success");
                closeModal();
                loadDashboardData();
            } catch (err) {
                showToast("Error", err.message, "error");
            }
        }

        // 4. FETCH ALERTS -> DASHBOARD
        async function loadDashboardData() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-bold animate-pulse">Scanning Backend...</div>`;
            
            try {
                const res = await fetch(`${API_URL}/api/alerts`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const alerts = await res.json();
                
                document.getElementById('nodeCount').innerText = alerts.length;
                
                if (alerts.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <i class="fas fa-ghost text-4xl text-slate-200 mb-4"></i>
                            <p class="text-slate-400 font-bold">No active nodes found.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = alerts.map(node => `
                    <div class="spatial-card node-entry p-8 rounded-[3rem] relative overflow-hidden">
                        <div class="flex items-center gap-5 mb-8">
                            <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white text-xl">
                                <i class="fas fa-microchip"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-slate-900 text-lg">${node.title}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Layer</p>
                            </div>
                        </div>
                        <p class="text-3xl font-black text-slate-900 mb-2">₹${node.amount}</p>
                        <p class="text-[10px] font-bold text-rose-500 mb-6 uppercase">Expires: ${new Date(node.expiry).toLocaleDateString()}</p>
                        <div class="bg-slate-900 p-4 rounded-2xl text-[10px] text-slate-300 italic flex items-center gap-2">
                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                            AI Monitoring Active
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-rose-500 font-bold p-10 bg-rose-50 rounded-3xl text-center">Sync Error: ${err.message}</div>`;
            }
        }

        // 5. LOGOUT SYSTEM
        function logout() {
            localStorage.removeItem("token");
            token = null;
            showToast("Connection Severed", "Securely logged out.", "info");
            checkAuth();
        }

        // UI HELPERS
        function openModal() { document.getElementById('nodeModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('nodeModal').classList.add('hidden'); }
        
        function showToast(title, message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === "success" ? "bg-emerald-500" : type === "error" ? "bg-rose-500" : "bg-slate-900";
            toast.className = `${color} text-white p-4 rounded-2xl shadow-2xl flex flex-col min-w-[240px] node-entry`;
            toast.innerHTML = `<strong class="text-sm">${title}</strong><span class="text-[10px] opacity-80">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
